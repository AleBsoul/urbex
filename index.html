<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Urbex Explorer | Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <button id="mobile-menu-toggle" onclick="toggleSidebar()">☰</button>

        <aside id="sidebar">
            <header>
                <h1>Urbex Explorer</h1>
                <div class="card">
                    <p class="label">Mappa Attiva:</p>
                    <h2 id="room-name">Caricamento...</h2>
                    <p class="label">Codice Invito:</p>
                    <div class="code-box">
                        <code id="room-code">----</code>
                        <button onclick="copyCode()">📋</button>
                    </div>
                </div>
                <div class="actions">
                    <button onclick="openModal()" class="btn-primary">+ Aggiungi Pin Manuale</button>
                    <div class="join-input">
                        <input type="text" id="join-code-field" placeholder="Codice amico...">
                        <button onclick="joinRoomByCode()">Entra</button>
                    </div>
                    <button onclick="createNewRoom()" class="btn-secondary">+ Nuova Stanza</button>
                </div>
                <div id="my-rooms-container">
                    <p class="label">Le tue mappe salvate:</p>
                    <div id="rooms-nav-list"></div>
                </div>
            </header>
            <section id="content">
                <input type="text" id="search-field" placeholder="Cerca tra i posti...">
                <div id="pin-list-container"></div>
            </section>
        </aside>

        <main id="map-container">
            <div id="map"></div>
        </main>

        <div id="modal-overlay" class="hidden">
            <div class="modal-content">
                <h3>Dettagli Posto</h3>
                <form id="pin-form">
                    <input type="hidden" id="edit-id">
                    <div class="form-group">
                        <label class="label">Nome Posto</label>
                        <input type="text" id="f-title" required>
                    </div>
                    <div class="form-group">
                        <label class="label">Descrizione</label>
                        <textarea id="f-desc" placeholder="Note d'accesso..."></textarea>
                    </div>
                    <div class="form-group">
                        <label class="label">Zona / Categoria</label>
                        <div class="zone-input-wrapper">
                            <select id="f-zone-select"></select>
                            <input type="text" id="f-zone-custom" class="hidden" placeholder="Nuova zona...">
                            <button type="button" id="btn-toggle-zone" onclick="toggleZoneInput()">+</button>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col">
                            <label class="label">Latitudine</label>
                            <input type="number" step="any" id="f-lat">
                        </div>
                        <div class="col">
                            <label class="label">Longitudine</label>
                            <input type="number" step="any" id="f-lng">
                        </div>
                    </div>
                    <div class="modal-btns">
                        <button type="submit" class="btn-save">Salva Pin</button>
                        <button type="button" onclick="closeModal()" class="btn-cancel">Chiudi</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>

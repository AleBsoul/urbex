<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Urb</title>
    
    <!-- Librerie Core -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Plugin Geocoder -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- LOADING SPINNNER -->
    <div id="loader-wrapper">
        <div class="loader"></div>
        <p>Caricamento dati...</p>
    </div>

    <div id="toast-container"></div>

    <div id="app">
        <div id="new-room-modal-overlay" class="hidden">
            <div class="modal-content">
                <h3>Nuova Mappa</h3>
                <div class="form-group">
                    <label class="label">Nome della mappa</label>
                    <input type="text" id="new-room-input" placeholder="Es: Urbex Milano">
                </div>
                <div class="modal-btns">
                    <button onclick="confirmCreateRoom()" class="btn-save">Crea</button>
                    <button onclick="closeNewRoomModal()" class="btn-cancel">Chiudi</button>
                </div>
            </div>
        </div>
        <button id="mobile-menu-toggle" onclick="toggleSidebar()">☰</button>

        <aside id="sidebar">
            <header>
                <h1>Gestisci i tuoi pin</h1>
                <div class="card">
                    <p class="label">Mappa Attiva:</p>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <h2 id="room-name">Caricamento...</h2>
                        <button onclick="renameCurrentRoom()"
                            style="background:transparent; border:none; cursor:pointer; font-size:0.9rem; color:var(--accent);">rinomina</button>
                    </div>
                    <p class="label">Codice Invito:</p>
                    <div class="code-box">
                        <code id="room-code">----</code>
                        <button id="copy-code-btn" onclick="copyCode()">📋</button>
                    </div>
                </div>
                <div class="actions">
                    <button onclick="openModal()" class="btn-primary">+ Aggiungi Pin</button>
                    <div class="join-input">
                        <input type="text" id="join-code-field" placeholder="Codice amico...">
                        <button onclick="joinRoomByCode()">Entra</button>
                    </div>
                    <button onclick="createNewRoom()" class="btn-secondary">+ Nuova Stanza</button>
                </div>
                <div id="my-rooms-container">
                    <p class="label">Le tue mappe salvate:</p>
                    <div id="rooms-nav-list"></div>
                </div>
            </header>
            <section id="content">
                <input type="text" id="search-field" placeholder="Cerca tra i posti...">
                <div id="pin-list-container"></div>
            </section>
        </aside>

        <main id="map-container">
            <div id="map"></div>
        </main>

        <!-- MODAL PER AGGIUNTA/EDIT PIN -->
        <div id="modal-overlay" class="hidden">
            <div class="modal-content">
                <h3>Dettagli Posto</h3>
                <form id="pin-form">
                    <input type="hidden" id="edit-id">
                    <div class="form-group">
                        <label class="label">Nome Posto</label>
                        <input type="text" id="f-title" required>
                    </div>
                    <div class="form-group">
                        <label class="label">Descrizione</label>
                        <textarea id="f-desc" placeholder="Note d'accesso..."></textarea>
                    </div>
                    <div class="form-group">
                        <label class="label">Zona / Categoria</label>
                        <div class="zone-input-wrapper">
                            <select id="f-zone-select"></select>
                            <input type="text" id="f-zone-custom" class="hidden" placeholder="Nuova zona...">
                            <button type="button" id="btn-toggle-zone" onclick="toggleZoneInput()">+</button>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col">
                            <label class="label">Latitudine</label>
                            <input type="number" step="any" id="f-lat">
                        </div>
                        <div class="col">
                            <label class="label">Longitudine</label>
                            <input type="number" step="any" id="f-lng">
                        </div>
                    </div>
                    <div class="modal-btns">
                        <button type="submit" class="btn-save">Salva Pin</button>
                        <button type="button" onclick="closeModal()" class="btn-cancel">Chiudi</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- MODALE RINOMINA MAPPA -->
        <div id="rename-modal-overlay" class="hidden">
            <div class="modal-content">
                <h3>Rinomina Mappa</h3>
                <div class="form-group">
                    <label class="label">Nuovo nome mappa</label>
                    <input type="text" id="rename-room-input">
                </div>
                <div class="modal-btns">
                    <button onclick="confirmRenameRoom()" class="btn-save">Salva</button>
                    <button onclick="closeRenameModal()" class="btn-cancel">Annulla</button>
                </div>
            </div>
        </div>
    </div>
    <div id="confirm-modal-overlay" class="hidden">
        <div class="modal-content">
            <h3>Sei sicuro?</h3>
            <p style="margin: 15px 0; color: var(--text-muted);">L'azione è irreversibile e il pin verrà rimosso per
                sempre.</p>
            <div class="modal-btns">
                <button id="confirm-delete-btn" class="btn-save" style="background: #ff6b6b;">Sì, Elimina</button>
                <button onclick="closeConfirmModal()" class="btn-cancel">Annulla</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
